<!DOCTYPE html>
<html lang="it">
<head>

  <title>Ultime 10 estrazioni Lotto</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <nav class="nav">
      <a href="/" class="active">Home</a>
      <a href="/giocate.html">Giocate</a>

  <main class="container">

        <option value="Firenze">Firenze</option>
        <option value="Genova">Genova</option>
        <option value="Milano">Milano</option>
        <option value="Napoli">Napoli</option>
        <option value="Palermo">Palermo</option>
        <option value="Roma">Roma</option>
        <option value="Torino">Torino</option>
        <option value="Venezia">Venezia</option>
        <option value="Nazionale">Nazionale</option>
      </select>

      <button id="ricarica" type="button">Aggiorna</button>
    </section>

    <section>
      <div class="section-title-row">
        <div>
          <h2>Risultati</h2>
          <p class="muted">Le ultime 10 estrazioni complete del Lotto.</p>
        </div>
        <div class="hero-actions">
          <a class="method-button" href="/giocate.html">Vai alle giocate</a>
          <a class="method-button secondary-button" href="/verifica-schedina.html">Verifica schedina</a>

      <div id="listaEstrazioni" class="cards"></div>

  <script src="script.js"></script>
